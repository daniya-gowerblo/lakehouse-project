services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/mlruns

  app:
    build: .
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATA_ROOT=/app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    working_dir: /app
    command: python src/main.py
